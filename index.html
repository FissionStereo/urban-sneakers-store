<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Sneakers</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <header class="navbar">
    <h2 class="logo">UrbanSneakers</h2>

    <nav class="nav-links">
      <a href="#">Inicio</a>
      <a href="#">Productos</a>
      <a href="#">Ofertas</a>
      <a href="#">Contacto</a>
    </nav>

    <button class="cart-btn">
      🛒 Carrito
      <span id="cart-count">0</span>
    </button>
  </header>

  <section class="hero">
    <div class="hero-content">
      <span>Nueva colección 2026</span>
      <h1>Sneakers modernos para tu estilo urbano</h1>
      <p>Encuentra zapatillas exclusivas con diseño premium para destacar todos los días.</p>
      <button class="primary-btn">Ver productos</button>
    </div>
  </section>

  <section class="products">

    <h2>Productos destacados</h2>

    <div class="products-container" id="products-container">

    </div>

  </section>

  <section class="cart-section">

  <h2>Carrito de compras</h2>

  <div id="cart-container">

  </div>

  <h3 id="cart-total">
    Total: $0
  </h3>

</section>

  <script src="./js/app.js"></script>
</body>
</html>
